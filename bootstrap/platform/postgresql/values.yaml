
architecture: standalone
tls:
  enabled: true
  autoGenerated: false
  certificatesSecret: postgresql-tls
  certFilename: tls.crt
  certKeyFilename: tls.key
primary:
  automountServiceAccountToken: true
  extraVolumes:
    - name: postgresql-cert
      secret:
        secretName: postgresql-tls
        defaultMode: 0400
  initdb:
    user: "postgres"
    scripts:
      01_readonly.sql: |
        CREATE ROLE ro NOINHERIT;
        GRANT SELECT ON ALL TABLES IN SCHEMA public TO ro;
  service:
    type: LoadBalancer
    ports:
      postgresql: 5432
    annotations:
      external-dns.alpha.kubernetes.io/hostname: postgresql.example.com
  persistence:
    enabled: true
    accessModes: ["ReadWriteOnce"]
    size: 1Gi